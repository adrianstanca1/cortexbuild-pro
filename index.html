<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="worker-src blob: 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: *.tile.openstreetmap.org https://unpkg.com; connect-src 'self' https: wss: https://*.ingest.sentry.io;" />
    <title>CortexBuild Pro - AI Construction Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-kWuPv7l4FIh2eSsDP0kvdtqGcMzad1diZ3WCc2uYd1LEQjHgZSUGnYcTmuap7jcFmY5pMwVzR0PXPR9hS9KQ1g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        /* Critical CSS - Prevent FOUC */
        html {
            visibility: visible;
            opacity: 1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f5;
            /* zinc-100 */
            color: #18181b;
            /* zinc-950 */
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Prevent layout shift during load */
        #root {
            min-height: 100vh;
        }

        /* Loading state - prevents flash */
        #root:empty::before {
            content: '';
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f5;
            z-index: 9999;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
    <script>
        // Asset loading fail-safe
        window.addEventListener('error', function(e) {
            const tags = ['SCRIPT', 'LINK'];
            if (e.target && tags.includes(e.target.tagName)) {
                console.warn('Asset load failed:', e.target.src || e.target.href);
                const lastReload = sessionStorage.getItem('last_asset_reload');
                const now = Date.now();
                // Only auto-reload once every 30 seconds to prevent loops
                if (!lastReload || (now - parseInt(lastReload) > 30000)) {
                    sessionStorage.setItem('last_asset_reload', now.toString());
                    console.log('Reloading page to fetch latest assets...');
                    setTimeout(() => window.location.reload(true), 500);
                }
            }
        }, true);
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
