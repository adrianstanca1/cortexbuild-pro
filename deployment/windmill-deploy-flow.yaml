# CortexBuild Pro - Windmill deployment flow template
# Import into Windmill and replace placeholders.
summary: CortexBuild Pro deployment flow (VPS + Docker Compose)
value:
  modules:
    - id: checkout_and_update
      value:
        type: script
        language: bash
        input_transforms:
          script: |
            set -euo pipefail
            cd /var/www/cortexbuild-pro
            git fetch origin
            git checkout ${BRANCH:-main}
            git pull --rebase origin ${BRANCH:-main}
    - id: rebuild_and_start
      value:
        type: script
        language: bash
        input_transforms:
          script: |
            set -euo pipefail
            cd /var/www/cortexbuild-pro/deployment
            docker compose pull app || true
            docker compose build --no-cache app
            docker compose up -d postgres app
    - id: migrate_and_healthcheck
      value:
        type: script
        language: bash
        input_transforms:
          script: |
            set -euo pipefail
            cd /var/www/cortexbuild-pro/deployment
            docker compose exec -T app npx prisma migrate deploy
            for i in $(seq 1 30); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
              if [ "$code" = "200" ]; then
                echo "healthy"
                exit 0
              fi
              sleep 5
            done
            echo "health check failed"
            docker compose logs --tail=100 app
            exit 1
  failure_module:
    id: on_failure
    value:
      type: script
      language: bash
      input_transforms:
        script: |
          echo "Deployment failed. Check Windmill run logs and Docker compose logs."
