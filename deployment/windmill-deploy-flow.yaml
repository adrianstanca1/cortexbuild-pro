# =================================================================
# Windmill Workflow for CortexBuild Pro Deployment
# =================================================================
# This workflow automates the full production build and deployment process
# including dependency cleanup, Docker image build, and public VPS deployment
# with Docker Manager (Portainer) integration
# =================================================================

summary: Deploy CortexBuild Pro - Full Production Pipeline
description: |
  Automated workflow to:
  1. Clean all dependencies and start fresh
  2. Build Docker image for production
  3. Deploy to public VPS via Docker Manager
  4. Run health checks and migrations
  5. Verify public accessibility

# Configuration Variables (override in Windmill settings or via environment)
# PROJECT_DIR: Base directory for the project (default: /root/cortexbuild_pro)
# DEPLOYMENT_DIR: Deployment scripts directory (default: /root/cortexbuild_pro/deployment)
# PUBLIC_DOMAIN: Public domain or IP for the deployment (e.g., yourdomain.com)
# CLEAN_BUILD: Set to "true" to force clean rebuild (default: true)
# ENABLE_DEBUG: Set to "true" for verbose output (default: false)

# Workflow steps
steps:
  # Step 0: Pre-deployment validation
  - id: validate_environment
    summary: Validate deployment environment and prerequisites
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  CortexBuild Pro - Pre-deployment Validation"
        echo "═══════════════════════════════════════════════════════════"
        
        PROJECT_DIR="${PROJECT_DIR:-/root/cortexbuild_pro}"
        DEPLOYMENT_DIR="${DEPLOYMENT_DIR:-$PROJECT_DIR/deployment}"
        
        ERRORS=0
        
        # Check Docker
        echo "Checking Docker..."
        if ! command -v docker &> /dev/null; then
          echo "✗ Docker is not installed"
          ERRORS=$((ERRORS + 1))
        else
          echo "✓ Docker is installed: $(docker --version)"
        fi
        
        # Check Docker Compose
        echo "Checking Docker Compose..."
        if ! docker compose version &> /dev/null; then
          echo "✗ Docker Compose is not available"
          ERRORS=$((ERRORS + 1))
        else
          echo "✓ Docker Compose is available"
        fi
        
        # Check project directory
        echo "Checking project directory..."
        if [ ! -d "$PROJECT_DIR" ]; then
          echo "✗ Project directory not found: $PROJECT_DIR"
          ERRORS=$((ERRORS + 1))
        else
          echo "✓ Project directory exists: $PROJECT_DIR"
        fi
        
        # Check deployment directory
        echo "Checking deployment directory..."
        if [ ! -d "$DEPLOYMENT_DIR" ]; then
          echo "✗ Deployment directory not found: $DEPLOYMENT_DIR"
          ERRORS=$((ERRORS + 1))
        else
          echo "✓ Deployment directory exists: $DEPLOYMENT_DIR"
        fi
        
        # Check for .env file
        echo "Checking environment configuration..."
        if [ ! -f "$DEPLOYMENT_DIR/.env" ] && [ ! -f "$DEPLOYMENT_DIR/.env.production" ]; then
          echo "⚠ No .env file found - will use defaults"
        else
          echo "✓ Environment file found"
        fi
        
        # Check disk space
        echo "Checking disk space..."
        DISK_AVAILABLE=$(df / --output=avail -BG | tail -1 | tr -d 'G ')
        if [ "$DISK_AVAILABLE" -lt 5 ]; then
          echo "⚠ Low disk space: ${DISK_AVAILABLE}GB available (recommend 5GB+)"
        else
          echo "✓ Disk space available: ${DISK_AVAILABLE}GB"
        fi
        
        # Check memory
        echo "Checking memory..."
        MEM_AVAILABLE=$(free -g | awk '/^Mem:/{print $7}')
        if [ "$MEM_AVAILABLE" -lt 1 ]; then
          echo "⚠ Low memory: ${MEM_AVAILABLE}GB available (recommend 2GB+)"
        else
          echo "✓ Memory available: ${MEM_AVAILABLE}GB"
        fi
        
        if [ $ERRORS -gt 0 ]; then
          echo ""
          echo "✗ Validation failed with $ERRORS errors"
          exit 1
        fi
        
        echo ""
        echo "✓ All pre-deployment checks passed!"
      language: bash

  # Step 1: Pull latest code
  - id: pull_code
    summary: Pull latest code from repository
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 1: Pulling Latest Code"
        echo "═══════════════════════════════════════════════════════════"
        
        PROJECT_DIR="${PROJECT_DIR:-/root/cortexbuild_pro}"
        
        cd "$PROJECT_DIR"
        
        # Check for local modifications
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "⚠ Local changes detected. Stashing..."
          git stash push -m "Auto-stash before deployment $(date +%Y%m%d_%H%M%S)"
        fi
        
        # Fetch all branches
        git fetch --all
        
        # Attempt to pull from 'main', then fall back to 'master'
        set +e
        BRANCH_PULLED=""
        
        git pull origin main 2>&1
        PULL_STATUS=$?
        if [ $PULL_STATUS -eq 0 ]; then
          BRANCH_PULLED="main"
        else
          echo "Info: 'main' branch not found, trying 'master'..."
          git pull origin master 2>&1
          PULL_STATUS=$?
          if [ $PULL_STATUS -eq 0 ]; then
            BRANCH_PULLED="master"
          fi
        fi
        set -e
        
        if [ -z "$BRANCH_PULLED" ]; then
          echo "✗ Failed to pull from both 'main' and 'master' branches"
          exit 1
        fi
        
        CURRENT_COMMIT=$(git rev-parse --short HEAD)
        CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        
        echo "✓ Code pulled successfully"
        echo "  Branch: $CURRENT_BRANCH"
        echo "  Commit: $CURRENT_COMMIT"
        echo "  Source: $BRANCH_PULLED"
      language: bash
    depends_on:
      - validate_environment

  # Step 2: Clean dependencies and caches
  - id: clean_dependencies
    summary: Kill all dependencies and start fresh
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 2: Cleaning Dependencies (Fresh Start)"
        echo "═══════════════════════════════════════════════════════════"
        
        PROJECT_DIR="${PROJECT_DIR:-/root/cortexbuild_pro}"
        CLEAN_BUILD="${CLEAN_BUILD:-true}"
        
        if [ "$CLEAN_BUILD" != "true" ]; then
          echo "Skipping clean build (CLEAN_BUILD=$CLEAN_BUILD)"
          exit 0
        fi
        
        cd "$PROJECT_DIR/nextjs_space"
        
        # Remove node_modules
        if [ -d "node_modules" ]; then
          echo "→ Removing node_modules..."
          rm -rf node_modules
          echo "✓ node_modules removed"
        fi
        
        # Remove lock files for fresh install
        if [ -f "package-lock.json" ]; then
          echo "→ Removing package-lock.json..."
          rm -f package-lock.json
          echo "✓ package-lock.json removed"
        fi
        
        if [ -f "yarn.lock" ]; then
          echo "→ Removing yarn.lock..."
          rm -f yarn.lock
          echo "✓ yarn.lock removed"
        fi
        
        # Remove Next.js build cache
        if [ -d ".next" ]; then
          echo "→ Removing .next build cache..."
          rm -rf .next
          echo "✓ .next removed"
        fi
        
        # Clean Docker build cache (optional, aggressive)
        if [ "${CLEAN_DOCKER_CACHE:-false}" = "true" ]; then
          echo "→ Cleaning Docker build cache..."
          docker builder prune -f --filter "until=24h"
          echo "✓ Docker cache cleaned"
        fi
        
        echo ""
        echo "✓ All dependencies and caches cleaned!"
      language: bash
    depends_on:
      - pull_code

  # Step 3: Build Docker image (fresh, no cache)
  - id: build_image
    summary: Build Docker image for production (fresh build)
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 3: Building Docker Image for Production"
        echo "═══════════════════════════════════════════════════════════"
        
        PROJECT_DIR="${PROJECT_DIR:-/root/cortexbuild_pro}"
        DEPLOYMENT_DIR="${DEPLOYMENT_DIR:-$PROJECT_DIR/deployment}"
        ENABLE_DEBUG="${ENABLE_DEBUG:-false}"
        
        cd "$DEPLOYMENT_DIR"
        
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        
        # Build options
        BUILD_OPTS="--progress=plain"
        
        # Add no-cache for completely fresh build
        if [ "${CLEAN_BUILD:-true}" = "true" ]; then
          BUILD_OPTS="$BUILD_OPTS --no-cache"
        fi
        
        echo "→ Building Docker image..."
        echo "  Timestamp: $TIMESTAMP"
        echo "  Options: $BUILD_OPTS"
        
        # Build the image
        docker build $BUILD_OPTS \
          -t cortexbuild-app:latest \
          -t cortexbuild-app:$TIMESTAMP \
          -f Dockerfile \
          ..
        
        # Verify image was created
        if docker image inspect cortexbuild-app:latest >/dev/null 2>&1; then
          IMAGE_SIZE=$(docker image inspect cortexbuild-app:latest --format='{{.Size}}' | numfmt --to=iec-i --suffix=B)
          echo ""
          echo "✓ Docker image built successfully!"
          echo "  Tags: cortexbuild-app:latest, cortexbuild-app:$TIMESTAMP"
          echo "  Size: $IMAGE_SIZE"
        else
          echo "✗ Docker image build failed!"
          exit 1
        fi
      language: bash
    depends_on:
      - clean_dependencies

  # Step 4: Stop existing containers
  - id: stop_containers
    summary: Stop existing application containers
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 4: Stopping Existing Containers"
        echo "═══════════════════════════════════════════════════════════"
        
        PROJECT_DIR="${PROJECT_DIR:-/root/cortexbuild_pro}"
        DEPLOYMENT_DIR="${DEPLOYMENT_DIR:-$PROJECT_DIR/deployment}"
        
        cd "$DEPLOYMENT_DIR"
        
        # Check if using Docker Stack or Compose
        if docker stack ls 2>/dev/null | grep -q cortexbuild; then
          echo "→ Detected Docker Stack deployment"
          echo "  Stack will be updated in-place (no downtime)"
        else
          echo "→ Using Docker Compose"
          echo "→ Stopping existing containers..."
          docker compose down --remove-orphans 2>/dev/null || true
          echo "✓ Containers stopped"
        fi
      language: bash
    depends_on:
      - build_image

  # Step 5: Deploy application
  - id: deploy_container
    summary: Deploy application container via Docker Manager
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 5: Deploying Application"
        echo "═══════════════════════════════════════════════════════════"
        
        PROJECT_DIR="${PROJECT_DIR:-/root/cortexbuild_pro}"
        DEPLOYMENT_DIR="${DEPLOYMENT_DIR:-$PROJECT_DIR/deployment}"
        
        cd "$DEPLOYMENT_DIR"
        
        # Check for .env file
        if [ ! -f ".env" ]; then
          if [ -f ".env.production" ]; then
            echo "→ Copying .env.production to .env"
            cp .env.production .env
          elif [ -f ".env.docker-manager" ]; then
            echo "→ Copying .env.docker-manager to .env"
            cp .env.docker-manager .env
          else
            echo "⚠ No .env file found, using defaults"
          fi
        fi
        
        # Deploy using Docker Compose or Stack
        if docker stack ls 2>/dev/null | grep -q cortexbuild; then
          echo "→ Updating Docker Stack..."
          docker stack deploy -c docker-stack.yml cortexbuild --with-registry-auth
        else
          echo "→ Starting services with Docker Compose..."
          docker compose up -d
        fi
        
        echo ""
        echo "✓ Deployment initiated"
        
        # Show running containers
        echo ""
        echo "Running containers:"
        docker compose ps 2>/dev/null || docker ps --filter "name=cortexbuild"
      language: bash
    depends_on:
      - stop_containers

  # Step 6: Wait for application health
  - id: health_check
    summary: Wait for application to be healthy
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 6: Health Check"
        echo "═══════════════════════════════════════════════════════════"
        
        HEALTHCHECK_URL="${HEALTHCHECK_URL:-http://localhost:3000/}"
        PUBLIC_DOMAIN="${PUBLIC_DOMAIN:-}"
        HEALTHCHECK_RETRIES="${HEALTHCHECK_RETRIES:-30}"
        HEALTHCHECK_INTERVAL="${HEALTHCHECK_INTERVAL:-10}"
        
        echo "→ Waiting for application to be healthy..."
        echo "  URL: $HEALTHCHECK_URL"
        echo "  Retries: $HEALTHCHECK_RETRIES"
        echo "  Interval: ${HEALTHCHECK_INTERVAL}s"
        
        COUNT=0
        while [ "${COUNT}" -lt "${HEALTHCHECK_RETRIES}" ]; do
          if curl -fsS "${HEALTHCHECK_URL}" >/dev/null 2>&1; then
            echo ""
            echo "✓ Application is healthy!"
            
            # Also check public domain if specified
            if [ -n "$PUBLIC_DOMAIN" ]; then
              PUBLIC_URL="https://${PUBLIC_DOMAIN}/"
              echo "→ Checking public accessibility at $PUBLIC_URL..."
              if curl -fsS "$PUBLIC_URL" >/dev/null 2>&1; then
                echo "✓ Public domain is accessible!"
              else
                echo "⚠ Public domain check failed (may need SSL setup)"
              fi
            fi
            
            exit 0
          fi
          
          COUNT=$((COUNT + 1))
          echo "  Attempt ${COUNT}/${HEALTHCHECK_RETRIES} - waiting ${HEALTHCHECK_INTERVAL}s..."
          sleep "${HEALTHCHECK_INTERVAL}"
        done
        
        echo ""
        echo "✗ Health check failed after ${HEALTHCHECK_RETRIES} attempts"
        echo "  Check logs: docker compose logs app"
        exit 1
      language: bash
    depends_on:
      - deploy_container

  # Step 7: Run database migrations
  - id: run_migrations
    summary: Run database migrations
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 7: Running Database Migrations"
        echo "═══════════════════════════════════════════════════════════"
        
        # Find app container
        CONTAINER=$(docker ps --filter "name=cortexbuild-app" --format "{{.Names}}" | head -1)
        
        if [ -z "$CONTAINER" ]; then
          # Try alternate naming
          CONTAINER=$(docker ps --filter "name=cortexbuild_app" --format "{{.Names}}" | head -1)
        fi
        
        if [ -z "$CONTAINER" ]; then
          echo "✗ Could not find cortexbuild app container"
          docker ps
          exit 1
        fi
        
        echo "→ Running migrations in container: $CONTAINER"
        
        # Run Prisma migrations
        docker exec "$CONTAINER" npx prisma migrate deploy
        
        echo ""
        echo "✓ Migrations completed successfully!"
      language: bash
    depends_on:
      - health_check

  # Step 8: Verify public deployment
  - id: verify_public
    summary: Verify public deployment is accessible
    script:
      content: |
        #!/bin/bash
        set -e
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 8: Verifying Public Deployment"
        echo "═══════════════════════════════════════════════════════════"
        
        PUBLIC_DOMAIN="${PUBLIC_DOMAIN:-}"
        SERVER_IP=$(hostname -I | awk '{print $1}')
        
        echo "Server IP: $SERVER_IP"
        echo "Public Domain: ${PUBLIC_DOMAIN:-Not configured}"
        
        # Check local access
        echo ""
        echo "→ Checking local access (http://localhost:3000)..."
        if curl -fsS "http://localhost:3000/" >/dev/null 2>&1; then
          echo "✓ Local access: OK"
        else
          echo "✗ Local access: FAILED"
        fi
        
        # Check IP access
        echo ""
        echo "→ Checking IP access (http://$SERVER_IP:3000)..."
        if curl -fsS "http://$SERVER_IP:3000/" >/dev/null 2>&1; then
          echo "✓ IP access: OK"
        else
          echo "⚠ IP access: FAILED (firewall may block port 3000)"
        fi
        
        # Check public domain if configured
        if [ -n "$PUBLIC_DOMAIN" ]; then
          echo ""
          echo "→ Checking public domain (https://$PUBLIC_DOMAIN)..."
          if curl -fsS "https://$PUBLIC_DOMAIN/" >/dev/null 2>&1; then
            echo "✓ Public domain (HTTPS): OK"
          elif curl -fsS "http://$PUBLIC_DOMAIN/" >/dev/null 2>&1; then
            echo "✓ Public domain (HTTP): OK"
            echo "⚠ Consider enabling HTTPS"
          else
            echo "⚠ Public domain: NOT ACCESSIBLE"
            echo "  Check DNS settings and firewall rules"
          fi
        fi
        
        echo ""
        echo "═══════════════════════════════════════════════════════════"
        echo "  Deployment Summary"
        echo "═══════════════════════════════════════════════════════════"
        echo ""
        echo "Application URL: http://$SERVER_IP:3000"
        if [ -n "$PUBLIC_DOMAIN" ]; then
          echo "Public URL: https://$PUBLIC_DOMAIN"
        fi
        echo ""
        echo "Docker Status:"
        docker ps --filter "name=cortexbuild" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
        echo ""
        echo "✓ Deployment verification complete!"
      language: bash
    depends_on:
      - run_migrations

  # Step 9: Cleanup old images
  - id: cleanup
    summary: Cleanup old Docker images and resources
    script:
      content: |
        #!/bin/bash
        
        echo "═══════════════════════════════════════════════════════════"
        echo "  Step 9: Cleanup"
        echo "═══════════════════════════════════════════════════════════"
        
        # Keep last 3 tagged images, remove older ones
        echo "→ Removing old Docker images (keeping last 3)..."
        
        # Get all cortexbuild-app images sorted by date
        IMAGES=$(docker images cortexbuild-app --format "{{.ID}} {{.Tag}}" | grep -v latest | tail -n +4)
        
        if [ -n "$IMAGES" ]; then
          echo "$IMAGES" | while read ID TAG; do
            echo "  Removing: cortexbuild-app:$TAG"
            docker rmi "cortexbuild-app:$TAG" 2>/dev/null || true
          done
        else
          echo "  No old images to remove"
        fi
        
        # Remove dangling images
        echo "→ Removing dangling images..."
        docker image prune -f
        
        # Remove unused volumes (careful!)
        if [ "${CLEANUP_VOLUMES:-false}" = "true" ]; then
          echo "→ Removing unused volumes..."
          docker volume prune -f
        fi
        
        echo ""
        echo "✓ Cleanup complete!"
      language: bash
    depends_on:
      - verify_public

# Trigger configuration
trigger:
  # Schedule: Run daily at 2 AM UTC (adjust timezone as needed)
  schedule: "0 2 * * *"
  # Enable webhook for CI/CD and manual triggers
  webhook: true

# Environment variables (can be overridden per-run)
env:
  PROJECT_DIR: "/root/cortexbuild_pro"
  DEPLOYMENT_DIR: "/root/cortexbuild_pro/deployment"
  CLEAN_BUILD: "true"
  HEALTHCHECK_RETRIES: "30"
  HEALTHCHECK_INTERVAL: "10"
  # PUBLIC_DOMAIN: "yourdomain.com"  # Set in Windmill UI

# Notification settings
notifications:
  on_success:
    - type: email
      message: |
        ✓ CortexBuild Pro deployed successfully!
        
        Deployment completed at: {{timestamp}}
        Server: {{hostname}}
        
        Access your application at the configured URL.
  on_failure:
    - type: email
      message: |
        ✗ CortexBuild Pro deployment failed!
        
        Failed at step: {{failed_step}}
        Error: {{error_message}}
        
        Please check the Windmill logs for details.

# Metadata
metadata:
  version: "2.0.0"
  updated: "2026-02-05"
  author: "CortexBuild Pro Team"
  description: |
    Full production deployment pipeline with:
    - Clean dependency installation
    - Fresh Docker image build
    - Docker Manager/Portainer integration
    - Health checks and migrations
    - Public VPS deployment verification
