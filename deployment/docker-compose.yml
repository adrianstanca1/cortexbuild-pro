# ============================================================
# CortexBuild Pro - Docker Compose Configuration
# ============================================================
# 
# REQUIRED ENVIRONMENT VARIABLES (must be set before running):
#   - POSTGRES_PASSWORD: Database password - generate with `openssl rand -base64 24`
#   - NEXTAUTH_SECRET: JWT secret - generate with `openssl rand -base64 32`
#   - ENCRYPTION_KEY: Data encryption key - generate with `openssl rand -hex 32`
#
# OPTIONAL ENVIRONMENT VARIABLES (have defaults):
#   - POSTGRES_USER: Database username (default: cortexbuild)
#   - POSTGRES_DB: Database name (default: cortexbuild)
#   - NEXTAUTH_URL: Application URL (default: https://cortexbuildpro.com)
#   - ABACUSAI_API_KEY: AbacusAI API key (optional, for AI features)
#
# Usage:
#   # Set required variables and run
#   export POSTGRES_PASSWORD=$(openssl rand -base64 24)
#   export NEXTAUTH_SECRET=$(openssl rand -base64 32)
#   export ENCRYPTION_KEY=$(openssl rand -hex 32)
#   docker compose up -d
#
# Or use an .env file in the deployment directory (recommended for production):
#   cp .env.docker-manager .env
#   # Edit .env to set all required values (DB credentials, NEXTAUTH_SECRET, ENCRYPTION_KEY, etc.)
#   docker compose --env-file .env up -d
# ============================================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cortexbuild-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - generate with: openssl rand -base64 24}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5433:5432"
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexbuild} -d ${POSTGRES_DB:-cortexbuild}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: cortexbuild-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cortexbuild}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-cortexbuild}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://cortexbuildpro.com}
      # REQUIRED: Generate with `openssl rand -base64 32`
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required - generate with: openssl rand -base64 32}
      # REQUIRED: Generate with `openssl rand -hex 32`
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required - generate with: openssl rand -hex 32}
      # OPTIONAL: AbacusAI API key for AI features (app works without it, but AI endpoints will fail)
      - ABACUSAI_API_KEY=${ABACUSAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  cortexbuild-network:
    driver: bridge

volumes:
  postgres_data:
