# ============================================================
# CortexBuild Pro — Production Docker Compose
# ============================================================
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
#
# Ollama (local AI) runs on the HOST machine.
# Containers reach it via host.docker.internal:11434.
# Install: https://ollama.com/download
# Pull model: ollama pull qwen2.5:7b
# ============================================================

version: '3.8'

services:

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cortexbuild-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    expose:
      - "5432"
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexbuild} -d ${POSTGRES_DB:-cortexbuild}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Application ────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      args:
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-build-secret}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    image: cortexbuild-app:latest
    container_name: cortexbuild-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Core
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cortexbuild}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cortexbuild}?schema=public
      # Auth
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # OAuth providers
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      # Ollama AI — local LLM on host, reachable via host.docker.internal
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      # AWS S3 file storage
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-eu-west-2}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-}
      - AWS_FOLDER_PREFIX=${AWS_FOLDER_PREFIX:-cortexbuild/}
      # Email — SendGrid
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@cortexbuildpro.com}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-CortexBuild Pro}
      # Email — SMTP fallback
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      # Notification workflow IDs
      - NOTIF_ID_MILESTONE_DEADLINE_REMINDER=${NOTIF_ID_MILESTONE_DEADLINE_REMINDER:-}
      - NOTIF_ID_TOOLBOX_TALK_COMPLETED=${NOTIF_ID_TOOLBOX_TALK_COMPLETED:-}
      - NOTIF_ID_MEWP_CHECK_COMPLETED=${NOTIF_ID_MEWP_CHECK_COMPLETED:-}
      - NOTIF_ID_TOOL_CHECK_COMPLETED=${NOTIF_ID_TOOL_CHECK_COMPLETED:-}
      # WebSocket / real-time
      - NEXT_PUBLIC_WEBSOCKET_URL=${NEXT_PUBLIC_WEBSOCKET_URL:-}
      - WEBSOCKET_PORT=${WEBSOCKET_PORT:-3000}
    # Allows the container to reach Ollama running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cortexbuild-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cortexbuild-network

  # ── Certbot (Let's Encrypt auto-renew) ─────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: cortexbuild-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - cortexbuild-network

networks:
  cortexbuild-network:
    driver: bridge

volumes:
  postgres_data:
  app_uploads:
  certbot_www:
  certbot_certs:
