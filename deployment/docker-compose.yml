services:
  db:
    image: postgres:15-alpine
    container_name: cortexbuild-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexbuild} -d ${POSTGRES_DB:-cortexbuild}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: ${APP_IMAGE:-ghcr.io/adrianstanca1/cortexbuild-pro:${DOCKER_IMAGE_TAG:-cortexbuildpro}}
    container_name: cortexbuild-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cortexbuild}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cortexbuild}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://www.cortexbuildpro.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-}
      - AWS_REGION=${AWS_REGION:-eu-west-2}
      - AWS_FOLDER_PREFIX=${AWS_FOLDER_PREFIX:-cortexbuild/}
      - ABACUSAI_API_KEY=${ABACUSAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-abacus}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-CortexBuild Pro}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - NEXT_PUBLIC_WEBSOCKET_URL=${NEXT_PUBLIC_WEBSOCKET_URL:-}
      - WEBSOCKET_PORT=${WEBSOCKET_PORT:-3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cortexbuild-network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cortex.rule=Host(`cortexbuildpro.com`) || Host(`www.cortexbuildpro.com`)"
      - "traefik.http.routers.cortex.entrypoints=websecure"
      - "traefik.http.routers.cortex.tls.certresolver=letsencrypt"
      - "traefik.http.services.cortex.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  cortexbuild-network:
    driver: bridge
  traefik:
    external: true

volumes:
  postgres_data:
