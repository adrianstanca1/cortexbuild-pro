# ============================================================
# CortexBuild Pro - Docker Compose Configuration
# ============================================================
# 
# REQUIRED ENVIRONMENT VARIABLES (must be set before running):
#   - POSTGRES_PASSWORD: Database password - generate with `openssl rand -base64 24`
#   - NEXTAUTH_SECRET: JWT secret - generate with `openssl rand -base64 32`
#   - ENCRYPTION_KEY: Data encryption key - generate with `openssl rand -hex 32`
#
# OPTIONAL ENVIRONMENT VARIABLES (have defaults):
#   - POSTGRES_USER: Database username (default: cortexbuild)
#   - POSTGRES_DB: Database name (default: cortexbuild)
#   - NEXTAUTH_URL: Application URL (default: https://cortexbuildpro.com)
#   - ABACUSAI_API_KEY: AbacusAI API key (optional, for AI features)
#
# Usage:
#   # Set required variables and run
#   export POSTGRES_PASSWORD=$(openssl rand -base64 24)
#   export NEXTAUTH_SECRET=$(openssl rand -base64 32)
#   export ENCRYPTION_KEY=$(openssl rand -hex 32)
#   docker compose up -d
#
# Or use an .env file in the deployment directory (recommended for production):
#   cp .env.example .env
#   # Edit .env to set all required values (DB credentials, NEXTAUTH_SECRET, ENCRYPTION_KEY, etc.)
#   docker compose --env-file .env up -d
# ============================================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cortexbuild-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      # POSTGRES_PASSWORD must be set in .env file - no default for security
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5433:5432"
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexbuild} -d ${POSTGRES_DB:-cortexbuild}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    # Use specific image tag for deterministic deployments
    # Tag format: ghcr.io/adrianstanca1/cortexbuild-pro:cortexbuildpro-<sha>
    # Falls back to building from Dockerfile if image not available
    image: ${APP_IMAGE:-ghcr.io/adrianstanca1/cortexbuild-pro:${DOCKER_IMAGE_TAG:-cortexbuildpro}}
    container_name: cortexbuild-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cortexbuild}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cortexbuild}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://www.cortexbuildpro.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # AWS S3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-}
      - AWS_REGION=${AWS_REGION:-eu-west-2}
      - AWS_FOLDER_PREFIX=${AWS_FOLDER_PREFIX:-cortexbuild/}
      # AI Features
      - ABACUSAI_API_KEY=${ABACUSAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-abacus}
      # Google OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Email - SendGrid (optional)
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-CortexBuild Pro}
      # Email - SMTP (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      # WebSocket
      - NEXT_PUBLIC_WEBSOCKET_URL=${NEXT_PUBLIC_WEBSOCKET_URL:-}
      - WEBSOCKET_PORT=${WEBSOCKET_PORT:-3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Nginx Reverse Proxy (production)
  nginx:
    image: nginx:alpine
    container_name: cortexbuild-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cortexbuild-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: cortexbuild-certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - nginx
    # Certbot runs on-demand via docker compose run certbot ...
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  cortexbuild-network:
    driver: bridge

volumes:
  postgres_data:
  certbot_data:
  certbot_certs:
