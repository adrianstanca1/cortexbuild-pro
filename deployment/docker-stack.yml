# Docker Stack file for Portainer/Docker Manager deployment
# This file can be used directly in Portainer's Stack editor or Docker Swarm
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Note: For backups, use a named volume or absolute path in production
      # - /var/lib/cortexbuild/backups:/backups
    networks:
      - cortexbuild-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexbuild} -d ${POSTGRES_DB:-cortexbuild}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    # Note: Image must be built beforehand using:
    #   cd deployment && docker build -t cortexbuild-app:latest -f Dockerfile ..
    # or use the docker-manager-deploy.sh script
    image: cortexbuild-app:latest
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cortexbuild}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-cortexbuild}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL must be set}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ABACUSAI_API_KEY=${ABACUSAI_API_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - cortexbuild-network
    depends_on:
      - db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', res => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  cortexbuild-network:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local
