name: CI

on:
  push:
    branches: [ Cortexbuildpro, main, master ]
  pull_request:
    branches: [ Cortexbuildpro, main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Vitest tests
      run: npm test
      
    - name: Run test coverage
      run: npm run test:coverage

  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Build Next.js app
      run: npm run build
      
    - name: Security audit
      run: npm audit --production