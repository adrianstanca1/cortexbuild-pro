version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cortexbuild_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: cortexbuild
      POSTGRES_PASSWORD: cortexbuild_dev_password
      POSTGRES_DB: cortexbuild_dev
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortexbuild"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cortexbuild_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
