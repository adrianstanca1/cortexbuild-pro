events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Unified API routing
    # Explicit backend namespaces
    location /api/node/ {
      proxy_pass http://node-backend:4000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/java/ {
      proxy_pass http://java-backend:4001/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Smart unified endpoint (prefer Java enhanced endpoints first)
    location /api/enhanced/ {
      proxy_pass http://java-backend:4001/api/enhanced/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy direct /api calls default to node backend
    location /api/ {
      proxy_pass http://node-backend:4000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend routing fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Health
    location /health {
      access_log off;
      return 200 "OK\n";
    }
  }
}
