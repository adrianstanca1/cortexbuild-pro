name: Security Audit

on:
  push:
    branches: [Cortexbuildpro, main, master, master-integrated]
  pull_request:
    branches: [Cortexbuildpro, main, master, master-integrated]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (root)
        run: npm audit --json > audit-root.json
        continue-on-error: true

      - name: Install Next.js dependencies
        working-directory: nextjs_space
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (Next.js)
        working-directory: nextjs_space
        run: npm audit --json > ../audit-nextjs.json
        continue-on-error: true

      - name: Check critical vulnerabilities
        run: |
          CRITICAL_ROOT=$(jq '.metadata.vulnerabilities.critical // 0' audit-root.json 2>/dev/null || echo 0)
          CRITICAL_NEXT=$(jq '.metadata.vulnerabilities.critical // 0' audit-nextjs.json 2>/dev/null || echo 0)
          TOTAL=$((CRITICAL_ROOT + CRITICAL_NEXT))
          echo "Root critical: $CRITICAL_ROOT"
          echo "Next.js critical: $CRITICAL_NEXT"
          echo "Total critical: $TOTAL"
          if [ "$TOTAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi
          echo "✅ No critical vulnerabilities"
        continue-on-error: true

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: |
            audit-root.json
            audit-nextjs.json
