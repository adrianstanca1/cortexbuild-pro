name: Build Next.js Application

# DISABLED: This workflow is redundant with integration-check.yml which
# already includes build validation, lint, type check, Docker build, and
# Prisma schema validation. Keeping this file to preserve workflow history.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: nextjs_space/package-lock.json

    - name: Install dependencies
      working-directory: ./nextjs_space
      run: npm ci --legacy-peer-deps

    - name: Generate Prisma Client
      working-directory: ./nextjs_space
      run: npx prisma generate
      env:
        DATABASE_URL: "postgresql://test:test@localhost:5432/test"

    - name: Build Next.js application
      working-directory: ./nextjs_space
      run: npm run build
      env:
        DATABASE_URL: "postgresql://test:test@localhost:5432/test"
        NEXTAUTH_SECRET: "test-secret-for-ci-build-only"
        NEXTAUTH_URL: "http://localhost:3000"