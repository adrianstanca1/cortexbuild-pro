name: CI - Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run build:frontend

  build-backend:
    name: Build Backend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd server && npm ci && npm run build

  build-nextjs:
    name: Build Next.js App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs_space/package-lock.json
      - run: cd nextjs_space && npm ci --legacy-peer-deps
      - run: cd nextjs_space && npx prisma generate
      - run: cd nextjs_space && npm run build
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          NEXTAUTH_SECRET: "ci-build-placeholder"
          NEXTAUTH_URL: "http://localhost:3000"
          SKIP_ENV_VALIDATION: "1"

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [build-nextjs]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: false
          tags: cortexbuild-pro:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
