name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'master-integrated'
      setup_ssl:
        description: 'Set up SSL after deployment?'
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 600s
          command_timeout: 30m
          script: |
            set -e
            echo "========================================="
            echo "CortexBuild Pro - VPS Deployment"
            echo "========================================="
            echo "Branch: ${{ github.event.inputs.branch }}"
            echo ""

            REPO_URL="https://github.com/adrianstanca1/cortexbuild-pro.git"
            BRANCH="${{ github.event.inputs.branch }}"
            DEPLOY_DIR="/var/www/cortexbuild-pro"

            # Step 1: Install dependencies if needed
            echo "[1/7] Checking system dependencies..."
            if ! command -v git &> /dev/null; then
              apt-get update && apt-get install -y git curl wget openssl ufw
            fi
            echo "  Dependencies OK"

            # Step 2: Install Docker if needed
            echo "[2/7] Checking Docker..."
            if ! command -v docker &> /dev/null; then
              echo "  Installing Docker..."
              apt-get update && apt-get install -y docker.io docker-compose-plugin
              systemctl enable docker && systemctl start docker
            fi
            # Ensure docker compose plugin is available
            if ! docker compose version &> /dev/null; then
              apt-get update && apt-get install -y docker-compose-plugin
            fi
            docker --version
            docker compose version
            echo "  Docker OK"

            # Step 3: Configure firewall
            echo "[3/7] Configuring firewall..."
            if command -v ufw &> /dev/null; then
              ufw allow ssh 2>/dev/null || true
              ufw allow 80/tcp 2>/dev/null || true
              ufw allow 443/tcp 2>/dev/null || true
              ufw allow 3000/tcp 2>/dev/null || true
              ufw --force enable 2>/dev/null || true
            fi
            echo "  Firewall OK"

            # Step 4: Clone or update repository
            echo "[4/7] Fetching application..."
            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR"
              git fetch origin
              git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
              git pull origin "$BRANCH"
            else
              rm -rf "$DEPLOY_DIR"
              git clone -b "$BRANCH" "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi
            echo "  Repository ready at $(git log --oneline -1)"

            # Step 5: Configure environment
            echo "[5/7] Configuring environment..."
            cd "$DEPLOY_DIR/deployment"

            if [ ! -f .env ]; then
              POSTGRES_PASSWORD=$(openssl rand -base64 24 | tr -d '/+=')
              NEXTAUTH_SECRET=$(openssl rand -base64 32)
              ENCRYPTION_KEY=$(openssl rand -hex 32)
              SERVER_IP=$(curl -s ifconfig.me 2>/dev/null || echo "localhost")

              cat > .env << ENVEOF
            POSTGRES_USER=cortexbuild
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=cortexbuild
            NEXTAUTH_SECRET=$NEXTAUTH_SECRET
            NEXTAUTH_URL=https://www.cortexbuildpro.com
            ENCRYPTION_KEY=$ENCRYPTION_KEY
            DOMAIN=cortexbuildpro.com
            SSL_EMAIL=admin@cortexbuildpro.com
            NEXT_PUBLIC_WEBSOCKET_URL=https://www.cortexbuildpro.com
            WEBSOCKET_PORT=3000
            AWS_ACCESS_KEY_ID=
            AWS_SECRET_ACCESS_KEY=
            AWS_REGION=eu-west-2
            AWS_BUCKET_NAME=
            AWS_FOLDER_PREFIX=cortexbuild/
            ABACUSAI_API_KEY=
            GEMINI_API_KEY=
            AI_PROVIDER=abacus
            GOOGLE_CLIENT_ID=
            GOOGLE_CLIENT_SECRET=
            SENDGRID_API_KEY=
            SENDGRID_FROM_EMAIL=noreply@cortexbuildpro.com
            SENDGRID_FROM_NAME=CortexBuild Pro
            ENVEOF

              echo "  Generated new .env with secure credentials"
              echo "  DB Password: $POSTGRES_PASSWORD"
              echo "  Server IP: $SERVER_IP"
            else
              echo "  Using existing .env"
            fi

            # Step 6: Build and deploy
            echo "[6/7] Building and starting services..."
            cd "$DEPLOY_DIR/deployment"

            # Stop existing containers if any
            docker compose down 2>/dev/null || true

            # Pull base images
            docker compose pull db 2>/dev/null || true

            # Build application
            docker compose build app

            # Start database first
            docker compose up -d db
            echo "  Waiting for database..."
            sleep 15

            # Start application
            docker compose up -d app
            echo "  Waiting for app to initialize..."
            sleep 60

            # Run database migrations
            echo "  Running database migrations..."
            docker compose exec -T app sh -c "cd /app && npx prisma migrate deploy" 2>/dev/null || echo "  Migrations will run on first request"

            # Start nginx (without SSL initially)
            docker compose up -d nginx 2>/dev/null || echo "  Nginx will start after app is healthy"

            # Step 7: Verify
            echo "[7/7] Verifying deployment..."
            sleep 10
            docker compose ps
            echo ""

            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "  Application is LIVE on port 3000"
            elif curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "  Application health check passed"
            else
              echo "  Application may still be initializing..."
              echo "  Check with: cd $DEPLOY_DIR/deployment && docker compose logs app"
            fi

            SERVER_IP=$(curl -s ifconfig.me 2>/dev/null || echo "unknown")
            echo ""
            echo "========================================="
            echo "DEPLOYMENT COMPLETE!"
            echo "========================================="
            echo "  HTTP: http://$SERVER_IP"
            echo "  Direct: http://$SERVER_IP:3000"
            echo "========================================="

      - name: Setup SSL
        if: ${{ github.event.inputs.setup_ssl == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 300s
          command_timeout: 10m
          script: |
            echo "Setting up SSL..."
            cd /var/www/cortexbuild-pro/deployment

            # Make sure nginx is running first
            docker compose up -d nginx 2>/dev/null || true
            sleep 5

            # Request certificate
            docker compose run --rm certbot certonly \
              --webroot \
              --webroot-path=/var/www/certbot \
              --email admin@cortexbuildpro.com \
              --agree-tos \
              --no-eff-email \
              -d cortexbuildpro.com \
              -d www.cortexbuildpro.com 2>&1 || echo "SSL setup needs DNS to be configured first"

            echo ""
            echo "SSL setup attempted. If DNS is not yet pointed to this server,"
            echo "re-run this workflow after configuring DNS A record."
