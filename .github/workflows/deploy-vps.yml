name: Deploy to VPS

on:
  push:
    branches:
      - Cortexbuildpro
      - main
      - master-integrated
      - claude/deploy-to-vps-*
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "Cortexbuildpro"
      setup_ssl:
        description: "Set up SSL after deployment?"
        required: false
        type: boolean
        default: true
      skip_tests:
        description: "Skip running tests?"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Pre-deployment checks
  # ============================================
  pre-deploy-checks:
    name: ✅ Pre-deployment Checks
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: ./nextjs_space
        run: npm install --legacy-peer-deps

      - name: Run lint
        working-directory: ./nextjs_space
        run: npm run lint || true

      - name: Run tests
        working-directory: ./nextjs_space
        run: npm test -- --passWithNoTests || true

  # ============================================
  # Build and push Docker image
  # ============================================
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: always() && (needs.pre-deploy-checks.result == 'success' || needs.pre-deploy-checks.result == 'skipped')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=cortexbuildpro-
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "✅ Image built and pushed!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🔖 Tags: ${{ steps.meta.outputs.tags }}"
          echo "🔍 Digest: ${{ steps.build.outputs.digest }}"

  # ============================================
  # Deploy to VPS
  # ============================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://www.cortexbuildpro.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 600s
          command_timeout: 30m
          script: |
            set -e
            echo "========================================="
            echo "🚀 CortexBuild Pro - VPS Deployment"
            echo "========================================="
            BRANCH="${{ github.event.inputs.branch || 'Cortexbuildpro' }}"
            echo "Branch: $BRANCH"

            REPO_URL="https://github.com/adrianstanca1/cortexbuild-pro.git"
            DEPLOY_DIR="/var/www/cortexbuildpro"

            echo "[1/8] Checking system dependencies..."
            if ! command -v git &> /dev/null; then
              apt-get update && apt-get install -y git curl wget openssl ufw
            fi
            echo "  ✅ Dependencies OK"

            echo "[2/8] Checking Docker..."
            if ! command -v docker &> /dev/null; then
              echo "  Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi
            if ! docker compose version &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi
            docker --version
            docker compose version
            echo "  ✅ Docker OK"

            echo "[3/8] Configuring firewall..."
            if command -v ufw &> /dev/null; then
              ufw allow ssh 2>/dev/null || true
              ufw allow 80/tcp 2>/dev/null || true
              ufw allow 443/tcp 2>/dev/null || true
              ufw allow 3000/tcp 2>/dev/null || true
              ufw --force enable 2>/dev/null || true
            fi
            echo "  ✅ Firewall OK"

            echo "[4/8] Fetching application..."
            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR"
              git fetch --depth 1 origin
              git checkout -B main origin/main
              git reset --hard origin/main
            else
              rm -rf "$DEPLOY_DIR"
              git clone --depth 1 -b "$BRANCH" "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi
            echo "  ✅ Repository ready at $(git log --oneline -1)"

            echo "[5/8] Configuring environment..."
            cd "$DEPLOY_DIR/deployment"

            if [ ! -f .env ]; then
              POSTGRES_PASSWORD=$(openssl rand -base64 24 | tr -d "/+=")
              NEXTAUTH_SECRET=$(openssl rand -base64 32)
              ENCRYPTION_KEY=$(openssl rand -hex 32)
              SERVER_IP=$(curl -s ifconfig.me 2>/dev/null || echo "localhost")
              printf "POSTGRES_USER=cortexbuild\n" > .env
              printf "POSTGRES_PASSWORD=%s\n" "$POSTGRES_PASSWORD" >> .env
              printf "POSTGRES_DB=cortexbuild\n" >> .env
              printf "NEXTAUTH_SECRET=%s\n" "$NEXTAUTH_SECRET" >> .env
              printf "NEXTAUTH_URL=https://www.cortexbuildpro.com\n" >> .env
              printf "ENCRYPTION_KEY=%s\n" "$ENCRYPTION_KEY" >> .env
              printf "DOMAIN=cortexbuildpro.com\n" >> .env
              printf "SSL_EMAIL=admin@cortexbuildpro.com\n" >> .env
              printf "NEXT_PUBLIC_WEBSOCKET_URL=https://www.cortexbuildpro.com\n" >> .env
              printf "WEBSOCKET_PORT=3000\n" >> .env
              printf "AWS_ACCESS_KEY_ID=\n" >> .env
              printf "AWS_SECRET_ACCESS_KEY=\n" >> .env
              printf "AWS_REGION=eu-west-2\n" >> .env
              printf "AWS_BUCKET_NAME=\n" >> .env
              printf "AWS_FOLDER_PREFIX=cortexbuild/\n" >> .env
              printf "ABACUSAI_API_KEY=\n" >> .env
              printf "GEMINI_API_KEY=\n" >> .env
              printf "AI_PROVIDER=abacus\n" >> .env
              printf "GOOGLE_CLIENT_ID=\n" >> .env
              printf "GOOGLE_CLIENT_SECRET=\n" >> .env
              printf "SENDGRID_API_KEY=\n" >> .env
              printf "SENDGRID_FROM_EMAIL=noreply@cortexbuildpro.com\n" >> .env
              printf "SENDGRID_FROM_NAME=CortexBuild Pro\n" >> .env
              echo "  ✅ Generated new .env with secure credentials"
              echo "  🔐 DB Password: $POSTGRES_PASSWORD"
              echo "  🌐 Server IP: $SERVER_IP"
            else
              echo "  ✅ Using existing .env"
            fi

            echo "[6/8] Pulling latest image..."
            docker compose -f docker-compose.vps.yml pull app

            echo "[7/8] Building and starting services..."
            docker compose -f docker-compose.vps.yml down app 2>/dev/null || true
            docker compose -f docker-compose.vps.yml pull db 2>/dev/null || true
            docker compose -f docker-compose.vps.yml up -d db
            echo "  ⏳ Waiting for database..."
            sleep 15
            docker compose -f docker-compose.vps.yml up -d app
            echo "  ⏳ Waiting for app to initialize..."
            sleep 60
            echo "  🔄 Running database migrations..."
            docker compose -f docker-compose.vps.yml exec -T app sh -c "cd /app && npx prisma migrate deploy" 2>/dev/null || echo "  ⚠️ Migrations will run on first request"
            echo "  🌐 Starting nginx..."
            docker compose -f docker-compose.vps.yml up -d nginx certbot

            echo "[8/8] Verifying deployment..."
            sleep 15
            docker compose -f docker-compose.vps.yml ps

            # Health check
            if curl -sf http://localhost/api/health > /dev/null 2>&1; then
              echo "  ✅ Application is LIVE via nginx on port 80"
            elif curl -sf http://localhost:3010/api/health > /dev/null 2>&1; then
              echo "  ✅ Application health check passed on port 3010"
            else
              echo "  ⚠️ Application may still be initializing..."
              echo "  📋 Check: cd $DEPLOY_DIR/deployment && docker compose -f docker-compose.vps.yml logs app nginx"
            fi

            SERVER_IP=$(curl -s ifconfig.me 2>/dev/null || echo "unknown")
            echo "========================================="
            echo "✅ DEPLOYMENT COMPLETE!"
            echo "========================================="
            echo "  🌐 HTTP:   http://$SERVER_IP"
            echo "  🔌 Direct: http://$SERVER_IP:3010"
            echo "========================================="

      - name: Setup SSL
        if: ${{ github.event.inputs.setup_ssl == 'true' || github.event_name == 'push' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 300s
          command_timeout: 10m
          script: |
            echo "🔒 Setting up SSL..."
            cd /var/www/cortexbuildpro/deployment

            # Ensure nginx is running (HTTP only at this stage for ACME challenge)
            docker compose -f docker-compose.vps.yml up -d nginx
            sleep 5

            # Obtain certificate via webroot challenge
            if docker compose -f docker-compose.vps.yml run --rm certbot certonly \
              --webroot \
              --webroot-path=/var/www/certbot \
              --email admin@cortexbuildpro.com \
              --agree-tos \
              --no-eff-email \
              -d cortexbuildpro.com \
              -d www.cortexbuildpro.com; then
              echo "  ✅ SSL certificate obtained successfully!"
              echo "  🔄 Restarting nginx to load SSL configuration..."
              docker compose -f docker-compose.vps.yml restart nginx
              sleep 5
              echo "  ✅ Nginx restarted with SSL configuration"
              if curl -sk https://www.cortexbuildpro.com/api/health > /dev/null 2>&1; then
                echo "  🔒 HTTPS is LIVE at https://www.cortexbuildpro.com"
              else
                echo "  ⏳ HTTPS not yet responding (DNS propagation may take a few minutes)"
              fi
            else
              echo "  ❌ SSL certificate request failed."
              echo "  📋 Ensure DNS A records for cortexbuildpro.com and www.cortexbuildpro.com"
              echo "     point to this server IP before running SSL setup."
              echo "  🔄 Then re-run with: Actions → Deploy to VPS → Run workflow (setup_ssl=true)"
            fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "# 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-deployment checks | ${{ needs.pre-deploy-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push Image | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to VPS | ${{ steps.deploy.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 URL: https://www.cortexbuildpro.com" >> $GITHUB_STEP_SUMMARY
