name: Deploy to VPS

on:
  # Manual trigger only for production deployments
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip tests before deployment'
        required: false
        default: false
        type: boolean

# Set minimal permissions for security
permissions:
  contents: read

jobs:
  pre-deployment-checks:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs_space/package-lock.json

      - name: Install dependencies
        working-directory: ./nextjs_space
        run: npm ci

      - name: Run ESLint
        working-directory: ./nextjs_space
        run: npm run lint

      - name: Generate Prisma Client
        working-directory: ./nextjs_space
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Type check with TypeScript
        working-directory: ./nextjs_space
        run: npx tsc --noEmit

      - name: Validate Prisma schema
        working-directory: ./nextjs_space
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build Next.js application
        working-directory: ./nextjs_space
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks]
    if: always() && (needs.pre-deployment-checks.result == 'success' || inputs.skip_tests)
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/vps_key -p $VPS_PORT $VPS_USER@$VPS_HOST << 'EOF'
            set -e

            echo "========================================="
            echo "Starting VPS Deployment"
            echo "========================================="

            # Navigate to project directory
            cd /root/cortexbuild-pro

            # Pull latest changes
            echo "Pulling latest code..."
            git fetch origin
            git pull origin cortexbuildpro

            # Run production deployment
            echo "Running production deployment..."
            cd deployment
            bash production-deploy.sh

            echo "========================================="
            echo "Deployment completed successfully!"
            echo "========================================="
          EOF

      - name: Health Check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          echo "Waiting for services to start..."
          sleep 30

          echo "Running health check with retries..."

          ssh -i ~/.ssh/vps_key -p $VPS_PORT $VPS_USER@$VPS_HOST << 'EOF'
            set -e

            # Health check with retries (up to 5 minutes)
            MAX_RETRIES=10
            RETRY_DELAY=30

            for i in $(seq 1 $MAX_RETRIES); do
              echo "Health check attempt $i/$MAX_RETRIES..."

              cd /root/cortexbuild-pro/deployment
              if bash health-check.sh; then
                echo "✓ Health check passed!"
                exit 0
              fi

              if [ $i -lt $MAX_RETRIES ]; then
                echo "Health check failed, retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              else
                echo "✗ Health check failed after $MAX_RETRIES attempts"
                echo "Check logs with: docker compose logs -f app"
                exit 1
              fi
            done
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/vps_key

  notify-deployment:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-to-vps]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.deploy-to-vps.result == 'success'
        run: |
          echo "✅ Deployment to ${{ inputs.environment }} completed successfully!"
          echo "Application should be available at: http://${{ secrets.VPS_HOST }}:3000"

      - name: Deployment Failed
        if: needs.deploy-to-vps.result == 'failure'
        run: |
          echo "❌ Deployment to ${{ inputs.environment }} failed!"
          echo "Check the logs above for details."
          exit 1
