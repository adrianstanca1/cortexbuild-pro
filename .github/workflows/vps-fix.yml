name: VPS Fix Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run on VPS'
        required: true
        default: 'echo hello'

jobs:
  run-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 600s
          command_timeout: 10m
          script: |
            ${{ github.event.inputs.command }}
